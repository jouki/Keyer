name: Build and Release

# Runs when a tag like v* is pushed (e.g. v1.0.0),
# or manually via "Run workflow" in the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required to create the release and upload the asset

jobs:
  build:
    runs-on: windows-latest

    env:
      # Mapped here so it can be used in an 'if' condition (secrets can't be used in 'if' directly).
      # The signing step is skipped until you add the SIGNPATH_API_TOKEN secret.
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore Keyer.sln

      # Costura.Fody embeds the dependencies into a single self-contained Keyer.exe
      # during this build (no separate merge step needed).
      - name: Build (Release)
        run: msbuild Keyer.sln /p:Configuration=Release /p:Platform="Any CPU" /t:Rebuild /v:minimal /nologo

      - name: Stage single-file executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "Keyer\bin\Release\Keyer.exe" "dist\Keyer.exe" -Force
          $sizeMB = [math]::Round((Get-Item "dist\Keyer.exe").Length/1MB, 1)
          Write-Host "Staged dist\Keyer.exe ($sizeMB MB)"

      - name: Upload unsigned artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: Keyer-unsigned
          path: dist/Keyer.exe

      # ---- Code signing via SignPath (runs once the project is approved and the secret/vars are set) ----
      # When the SignPath project is approved, configure:
      #   - Repo Secret:    SIGNPATH_API_TOKEN     (Settings > Secrets and variables > Actions > Secrets)
      #   - Repo Variables: SIGNPATH_ORGANIZATION_ID, SIGNPATH_PROJECT_SLUG, SIGNPATH_POLICY_SLUG (Variables)
      - name: Sign with SignPath
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        id: signpath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Prepare release asset
        shell: pwsh
        run: |
          if (Test-Path "signed\Keyer.exe") {
            Write-Host "Using SIGNED exe."
            Copy-Item "signed\Keyer.exe" "Keyer.exe" -Force
          } else {
            Write-Host "SignPath not configured - using UNSIGNED exe."
            Copy-Item "dist\Keyer.exe" "Keyer.exe" -Force
          }

      # The release is only created when a tag is pushed (not on manual workflow_dispatch).
      - name: Create GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: Keyer.exe
          generate_release_notes: true
